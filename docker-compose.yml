services:
  postgres:
    image: postgres:14-alpine
    environment:
      POSTGRES_USER: zeroid
      POSTGRES_PASSWORD: zeroid
      POSTGRES_DB: zeroid
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zeroid -d zeroid"]
      interval: 5s
      timeout: 3s
      retries: 5

  server:
    build: .
    ports:
      - "8899:8899"
    environment:
      ZEROID_DATABASE_URL: "postgres://zeroid:zeroid@postgres:5432/zeroid?sslmode=disable"
      ZEROID_ENV: development
    volumes:
      - ./keys:/keys:ro
    depends_on:
      postgres:
        condition: service_healthy
    command: ["/zeroid", "-config", "/etc/zeroid/zeroid.yaml"]

volumes:
  pgdata:

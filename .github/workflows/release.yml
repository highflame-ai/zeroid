name: Release Build - Zeroid

on:
  release:
    types:
      - published

env:
  # jwx v4 needs the encoding/json/v2 experiment (Go 1.26+).
  GOEXPERIMENT: "jsonv2"
  REGEX_PATTERN: "^v[0-9]+\\.[0-9]+\\.[0-9]+$"
  RELEASE_NAME: ${{ github.event.release.name }}
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  highflame-validate:
    permissions:
      contents: 'read'
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: true

      # Tag format gate. The original workflow gated this on
      # `steps.validate_branch.outputs.enable_branch_build == 'true'`,
      # but `validate_branch` was never a real step in this job — the
      # gate evaluated to false and the validation silently skipped on
      # every release. Removed; the format check now actually runs.
      - name: Validate Release Tag
        id: validate_tag
        shell: bash
        run: |-
          if [[ "${{ env.RELEASE_NAME }}" =~ ${{ env.REGEX_PATTERN }} ]] ; then
            echo "Valid version format: ${{ env.RELEASE_NAME }}"
          else
            echo "Invalid version format: ${{ env.RELEASE_NAME }}"
            exit 1
          fi

      - name: Setup Golang
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache: true

      # svu (caarlos0/svu) computes the semver bump implied by commit
      # messages since the last `v*` tag. Highflame's commit-prefix
      # convention maps cleanly onto Conventional Commits for the bumps:
      # `feat:` -> minor, `fix:` -> patch, `feat!:` / `BREAKING CHANGE:`
      # -> major. `devops:`, `build(deps)`, `[Snyk]`, `Bump` don't move
      # version numbers in svu's model, which matches our intent (those
      # are housekeeping, not user-visible).
      #
      # Behaviour: fail if the published tag is BELOW svu's
      # recommendation -- that means a `feat:` commit was missed and
      # we'd be silently shipping a feature as a patch. Allow tags AT
      # OR ABOVE the recommendation so a maintainer can manually force
      # a higher bump (e.g., release a major from a fix-only window).
      - name: Validate semver against commit history (svu)
        shell: bash
        run: |-
          go install github.com/caarlos0/svu/v3@latest
          EXPECTED="$(svu next)"
          ACTUAL="${{ env.RELEASE_NAME }}"
          echo "Published tag : ${ACTUAL}"
          echo "svu next      : ${EXPECTED}"
          # sort -V picks the highest of the two; if EXPECTED is
          # higher, ACTUAL is too low and a feat: was likely missed.
          HIGHEST="$(printf '%s\n%s\n' "${EXPECTED}" "${ACTUAL}" | sort -V | tail -1)"
          if [[ "${ACTUAL}" != "${EXPECTED}" && "${HIGHEST}" != "${ACTUAL}" ]]; then
            echo "::error::Release tag ${ACTUAL} is below svu's computed next version ${EXPECTED}."
            echo "::error::This usually means a feat: commit since the last tag implied a minor bump."
            echo "::error::Either retag at ${EXPECTED} or higher, or audit recent commit prefixes."
            exit 1
          fi
          if [[ "${ACTUAL}" != "${EXPECTED}" ]]; then
            echo "::notice::Release tag ${ACTUAL} is ahead of svu's recommendation (${EXPECTED}). Treating as an intentional manual bump."
          else
            echo "Release tag matches svu recommendation."
          fi

  tag-submodules:
    needs:
      - highflame-validate
    permissions:
      contents: write
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Tag pkg/authjwt sub-module
        shell: bash
        run: |
          VERSION="${{ env.RELEASE_NAME }}"
          SUBTAG="pkg/authjwt/${VERSION}"
          if git rev-parse "${SUBTAG}" >/dev/null 2>&1; then
            echo "Tag ${SUBTAG} already exists, skipping"
          else
            git tag "${SUBTAG}"
            git push origin "${SUBTAG}"
            echo "Created and pushed tag ${SUBTAG}"
          fi

  highflame-sast:
    needs:
      - highflame-validate
    permissions:
      contents: read
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup Golang
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Run tests
        env:
          CGO_ENABLED: 0
        shell: bash
        run: |-
          make test-integration

  highflame-goreleaser:
    needs:
      - highflame-validate
      - highflame-sast
    permissions:
      contents: write
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Setup Golang
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Create APP token
        uses: actions/create-github-app-token@v3
        id: token
        with:
          client-id: ${{ secrets.HIGHFLAME_GITHUB_APP_ID }}
          private-key: ${{ secrets.HIGHFLAME_GITHUB_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: |
            - ${{ github.repository }}

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        env:
          GITHUB_TOKEN: ${{ steps.token.outputs.token }}
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean

  highflame-docker:
    needs:
      - highflame-validate
      - highflame-sast
    permissions:
      contents: read
      packages: write
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.DEVOPS_PKG_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          pull: true
          push: true
          context: .
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  highflame-dependency-pr:
    needs:
      - highflame-validate
      - highflame-goreleaser
    permissions:
      contents: 'read'
      id-token: 'write'
    runs-on: ubuntu-24.04
    env:
      GO_GET_URL: "github.com/${{ github.repository }}@latest"
      DEPENDANT_BRANCH: main
      DEPENDANT_PR_BRANCH: "cicd-dependency-zeriod"
    strategy:
      matrix:
        repository:
          - highflame-authn
    steps:
      - name: Create APP token
        uses: actions/create-github-app-token@v3
        id: token
        with:
          client-id: ${{ secrets.HIGHFLAME_GITHUB_APP_ID }}
          private-key: ${{ secrets.HIGHFLAME_GITHUB_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: |
            - ${{ github.repository }}
            - ${{ matrix.repository }}

      - name: Dependant Repository Checkout
        uses: actions/checkout@v6
        with:
          repository: "${{ github.repository_owner }}/${{ matrix.repository }}"
          token: ${{ steps.token.outputs.token }}
          fetch-depth: 0
          persist-credentials: true
          ref: ${{ env.DEPENDANT_BRANCH }}

      - name: Setup Golang
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Update the Dependency
        env:
          GOPRIVATE: "github.com/highflame-ai/"
        shell: bash
        run: |-
          git config --global url."https://x-access-token:${{ steps.token.outputs.token }}@github.com/".insteadOf "https://github.com/"
          go get -u ${{ env.GO_GET_URL }}
          git status

      - name: Create Pull Request
        id: create_pr
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 #v8
        with:
          token: ${{ steps.token.outputs.token }}
          commit-message: 'devops: Update Dependency for ${{ matrix.repository }} tag ${{ github.event.release.tag_name }}'
          title: 'Dependency for ${{ matrix.repository }} tag ${{ github.event.release.tag_name }}'
          committer: GitHub Action <action@github.com>
          author: GitHub Action <action@github.com>
          body: >
            This PR is auto-generated by
            [release pipeline](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
          base: ${{ env.DEPENDANT_BRANCH }}
          branch: ${{ env.DEPENDANT_PR_BRANCH }}
          delete-branch: true
          add-paths: .
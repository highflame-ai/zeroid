name: Release Build - Zeroid

on:
  release:
    types:
      - published

env:
  GO_VER: "1.26.0"
  # jwx v4 needs the encoding/json/v2 experiment (Go 1.26+).
  GOEXPERIMENT: "jsonv2"
  REGEX_PATTERN: "^v[0-9]+\\.[0-9]+\\.[0-9]+$"
  RELEASE_NAME: ${{ github.event.release.name }}
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  highflame-validate:
    permissions:
      contents: 'read'
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: true

      # Tag format gate. The original workflow gated this on
      # `steps.validate_branch.outputs.enable_branch_build == 'true'`,
      # but `validate_branch` was never a real step in this job — the
      # gate evaluated to false and the validation silently skipped on
      # every release. Removed; the format check now actually runs.
      - name: Validate Release Tag
        id: validate_tag
        shell: bash
        run: |-
          if [[ "${{ env.RELEASE_NAME }}" =~ ${{ env.REGEX_PATTERN }} ]] ; then
            echo "Valid version format: ${{ env.RELEASE_NAME }}"
          else
            echo "Invalid version format: ${{ env.RELEASE_NAME }}"
            exit 1
          fi

      - name: Setup Golang Version
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VER }}
          cache: false

      # svu (caarlos0/svu) computes the semver bump implied by commit
      # messages since the last `v*` tag. Highflame's commit-prefix
      # convention maps cleanly onto Conventional Commits for the bumps:
      # `feat:` -> minor, `fix:` -> patch, `feat!:` / `BREAKING CHANGE:`
      # -> major. `devops:`, `build(deps)`, `[Snyk]`, `Bump` don't move
      # version numbers in svu's model, which matches our intent (those
      # are housekeeping, not user-visible).
      #
      # Behaviour: fail if the published tag is BELOW svu's
      # recommendation -- that means a `feat:` commit was missed and
      # we'd be silently shipping a feature as a patch. Allow tags AT
      # OR ABOVE the recommendation so a maintainer can manually force
      # a higher bump (e.g., release a major from a fix-only window).
      - name: Validate semver against commit history (svu)
        shell: bash
        run: |-
          go install github.com/caarlos0/svu/v3@latest
          EXPECTED="$(svu next)"
          ACTUAL="${{ env.RELEASE_NAME }}"
          echo "Published tag : ${ACTUAL}"
          echo "svu next      : ${EXPECTED}"
          # sort -V picks the highest of the two; if EXPECTED is
          # higher, ACTUAL is too low and a feat: was likely missed.
          HIGHEST="$(printf '%s\n%s\n' "${EXPECTED}" "${ACTUAL}" | sort -V | tail -1)"
          if [[ "${ACTUAL}" != "${EXPECTED}" && "${HIGHEST}" != "${ACTUAL}" ]]; then
            echo "::error::Release tag ${ACTUAL} is below svu's computed next version ${EXPECTED}."
            echo "::error::This usually means a feat: commit since the last tag implied a minor bump."
            echo "::error::Either retag at ${EXPECTED} or higher, or audit recent commit prefixes."
            exit 1
          fi
          if [[ "${ACTUAL}" != "${EXPECTED}" ]]; then
            echo "::notice::Release tag ${ACTUAL} is ahead of svu's recommendation (${EXPECTED}). Treating as an intentional manual bump."
          else
            echo "Release tag matches svu recommendation."
          fi

      # Cross-module version-consistency gate. zeroid is a Go module that
      # contains two nested published modules at pkg/authjwt and pkg/dpop.
      # zeroid's own non-test code imports pkg/dpop, so downstream
      # consumers pull pkg/dpop transitively — which means zeroid/go.mod
      # must reference pkg/dpop at a REAL released version (not the v0.0.0
      # placeholder + local replace, which Go does NOT honor across module
      # boundaries). When the prepare-release workflow runs, it auto-bumps
      # these refs to match the release tag; this gate enforces the
      # invariant in case someone publishes a release bypassing
      # prepare-release. See RELEASING.md for the full story.
      - name: Validate cross-module version refs match release tag
        shell: bash
        run: |-
          VERSION="${{ env.RELEASE_NAME }}"
          SUBMODULES=(pkg/authjwt pkg/dpop)
          FAIL=0
          for SUBMODULE in "${SUBMODULES[@]}"; do
            MODPATH="github.com/highflame-ai/zeroid/${SUBMODULE}"
            # Match the require line for this nested module. The version
            # is the last whitespace-separated token; this handles both
            # the direct (`MODPATH vX.Y.Z`) and `// indirect` shapes.
            REF=$(awk -v mp="${MODPATH}" '
              $1 == mp { print $2; exit }
            ' go.mod)
            if [[ -z "$REF" ]]; then
              echo "::error::go.mod has no require directive for ${MODPATH}"
              FAIL=1
              continue
            fi
            if [[ "$REF" != "$VERSION" ]]; then
              echo "::error::go.mod references ${MODPATH} ${REF} but release is ${VERSION}."
              echo "::error::Run prepare-release.yml with version=${VERSION}, OR manually:"
              echo "::error::  go mod edit -require=${MODPATH}@${VERSION} && go mod tidy"
              echo "::error::  git commit -am 'devops: prepare release ${VERSION}' && git push"
              echo "::error::Then re-publish the release pointing at the new commit."
              FAIL=1
            fi
          done
          if [[ $FAIL -eq 1 ]]; then
            exit 1
          fi
          echo "Cross-module version refs match release tag ${VERSION}."

  tag-submodules:
    needs:
      - highflame-validate
    permissions:
      contents: write
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: true

      # Each entry below is a nested Go module (its own go.mod under
      # the repo root) and must be tagged independently of the root —
      # Go's module proxy resolves `go get github.com/highflame-ai/
      # zeroid/<subpath>@vX.Y.Z` against a `<subpath>/vX.Y.Z` tag, not
      # the root `vX.Y.Z` tag. Without these tags, downstream consumers
      # cannot pin a specific version of the sub-module.
      #
      # Idempotent — skips tags that already exist (handles re-runs
      # of a published release, and out-of-band manual tags). To add
      # another sub-module, append it to the loop and confirm it has a
      # go.mod at that path.
      - name: Tag sub-modules
        shell: bash
        run: |
          VERSION="${{ env.RELEASE_NAME }}"
          SUBMODULES=(
            pkg/authjwt
            pkg/dpop
          )
          for SUBMODULE in "${SUBMODULES[@]}"; do
            SUBTAG="${SUBMODULE}/${VERSION}"
            if git rev-parse "${SUBTAG}" >/dev/null 2>&1; then
              echo "Tag ${SUBTAG} already exists, skipping"
            else
              git tag "${SUBTAG}"
              git push origin "${SUBTAG}"
              echo "Created and pushed tag ${SUBTAG}"
            fi
          done

  highflame-sast:
    needs:
      - highflame-validate
    permissions:
      contents: read
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup Golang Version
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VER }}
          cache: false

      - name: Cache Go modules and build cache
        uses: actions/cache@v5
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: go-${{ runner.os }}-${{ env.GO_VER }}-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            go-${{ runner.os }}-${{ env.GO_VER }}-

      - name: Run tests
        env:
          CGO_ENABLED: 0
        shell: bash
        run: |-
          make test-integration

  highflame-goreleaser:
    needs:
      - highflame-validate
      - highflame-sast
    permissions:
      contents: write
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Setup Golang Version
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VER }}
          cache: false

      - name: Cache Go modules and build cache
        uses: actions/cache@v5
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: go-${{ runner.os }}-${{ env.GO_VER }}-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            go-${{ runner.os }}-${{ env.GO_VER }}-

      - name: Create APP token
        uses: actions/create-github-app-token@v3
        id: token
        with:
          client-id: ${{ secrets.HIGHFLAME_GITHUB_APP_ID }}
          private-key: ${{ secrets.HIGHFLAME_GITHUB_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        env:
          GITHUB_TOKEN: ${{ steps.token.outputs.token }}
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean

  highflame-docker:
    needs:
      - highflame-validate
      - highflame-sast
    permissions:
      contents: read
      packages: write
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.DEVOPS_PKG_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          pull: true
          push: true
          context: .
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

name: Tag + Release - Zeroid

# Creates the root tag + GitHub release after a release-prep PR has
# been merged to main. Stage 2 of the PR-based release flow; stage 1
# is prepare-release.yml. See RELEASING.md for the full architecture.
#
# Maintainer flow:
#
#   1. Run prepare-release.yml with target version → opens PR
#   2. Review + merge the PR
#   3. Run this workflow with the same version → tags + releases
#
# Guards in this workflow:
#
#   - main HEAD must have go.mod cross-refs matching the target version
#     (i.e. the release-prep PR was actually merged before this fires)
#   - Sub-tags must already exist (created by prepare-release.yml)
#   - The release itself must not already exist (no overwrite)
#
# If any guard fails, the workflow stops with a clear error message
# pointing at the recovery path in RELEASING.md.

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (must match the merged release-prep PR, e.g. v1.7.0)'
        required: true
        type: string

env:
  REGEX_PATTERN: "^v[0-9]+\\.[0-9]+\\.[0-9]+$"

permissions:
  contents: write

jobs:
  tag-and-release:
    runs-on: ubuntu-24.04
    steps:
      - name: Validate version format
        shell: bash
        run: |-
          if [[ ! "${{ inputs.version }}" =~ ${{ env.REGEX_PATTERN }} ]]; then
            echo "::error::version must match vMAJOR.MINOR.PATCH; got ${{ inputs.version }}"
            exit 1
          fi

      - name: Create App token
        uses: actions/create-github-app-token@v3
        id: token
        with:
          client-id: ${{ secrets.HIGHFLAME_GITHUB_APP_ID }}
          private-key: ${{ secrets.HIGHFLAME_GITHUB_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Checkout main
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0
          token: ${{ steps.token.outputs.token }}

      # Guard 1: main HEAD's go.mod must reference the target version.
      # If this fails, the release-prep PR wasn't merged (or was merged
      # for a different version), and creating the release now would
      # produce a broken artifact.
      - name: Verify go.mod cross-refs match target version
        shell: bash
        run: |-
          VERSION="${{ inputs.version }}"
          FAIL=0
          for SUBMODULE in pkg/authjwt pkg/dpop; do
            MODPATH="github.com/highflame-ai/zeroid/${SUBMODULE}"
            REF=$(awk -v mp="${MODPATH}" '$1 == mp { print $2; exit }' go.mod)
            if [[ "$REF" != "$VERSION" ]]; then
              echo "::error::go.mod references ${MODPATH} ${REF} but target is ${VERSION}."
              echo "::error::Did you merge the release-prep PR for ${VERSION}?"
              echo "::error::If not: run prepare-release.yml with version=${VERSION}, review, and merge the PR first."
              FAIL=1
            fi
          done
          if [[ $FAIL -eq 1 ]]; then
            exit 1
          fi
          echo "✓ go.mod cross-refs match ${VERSION}"

      # Guard 2: sub-tags must exist (prepare-release.yml created them).
      # If missing, this is an unexpected state — fail loudly.
      - name: Verify sub-module tags exist
        shell: bash
        run: |-
          VERSION="${{ inputs.version }}"
          FAIL=0
          for SUBMODULE in pkg/authjwt pkg/dpop; do
            SUBTAG="${SUBMODULE}/${VERSION}"
            if ! git rev-parse "${SUBTAG}" >/dev/null 2>&1; then
              echo "::error::Sub-tag ${SUBTAG} does not exist on the remote."
              echo "::error::Expected prepare-release.yml to have created it. Re-run prepare-release.yml with version=${VERSION}."
              FAIL=1
            fi
          done
          if [[ $FAIL -eq 1 ]]; then
            exit 1
          fi
          echo "✓ Sub-module tags exist for ${VERSION}"

      # Guard 3: release must not already exist.
      - name: Verify release does not already exist
        shell: bash
        env:
          GH_TOKEN: ${{ steps.token.outputs.token }}
        run: |-
          VERSION="${{ inputs.version }}"
          if gh release view "${VERSION}" >/dev/null 2>&1; then
            echo "::error::Release ${VERSION} already exists. Refusing to overwrite."
            echo "::error::Delete the existing release first, or pick a new version."
            exit 1
          fi
          echo "✓ Release ${VERSION} does not yet exist"

      - name: Create GitHub release at main HEAD
        shell: bash
        env:
          GH_TOKEN: ${{ steps.token.outputs.token }}
        run: |-
          VERSION="${{ inputs.version }}"
          gh release create "${VERSION}" \
            --target main \
            --title "${VERSION}" \
            --generate-notes
          echo "::notice::Release ${VERSION} created at main HEAD."
          echo "::notice::release.yml will now fire on release:published — validate, tag-submodules (idempotent), tests, goreleaser, docker."

name: Prepare Release - Zeroid

# Authors a release-prep commit ("devops: prepare release vX.Y.Z") that
# bumps zeroid/go.mod's cross-module version refs to the target version,
# then creates the GitHub release pointing at that commit. The
# downstream on-release-published `release.yml` workflow takes over
# from there (validates, tags subpackages [idempotent — already done
# here], runs goreleaser, builds Docker image).
#
# Why this workflow exists: zeroid is a Go module that contains two
# nested published modules (pkg/authjwt, pkg/dpop). zeroid's own
# non-test code imports pkg/dpop, so downstream consumers pull
# pkg/dpop transitively. Go's module system requires zeroid/go.mod
# to reference these subpackages at REAL released versions for
# downstream `go get github.com/highflame-ai/zeroid@vX.Y.Z` resolution
# to work. The `replace ./pkg/...` directive that used to live in
# zeroid/go.mod worked for in-repo dev but did NOT propagate to
# downstream consumers (Go deliberately doesn't honor a transitive
# module's replaces). See RELEASING.md for the full architectural
# context.
#
# Atomicity guarantees:
#
#   - Sub-tags pkg/authjwt/vX.Y.Z and pkg/dpop/vX.Y.Z are pushed
#     BEFORE go.mod is bumped, so `go mod tidy` can resolve the new
#     versions. They point at the current main HEAD (pre-bump).
#   - The bump commit is then created on main referencing those
#     just-published sub-tags.
#   - The GitHub release tag vX.Y.Z is created at the bump commit.
#   - pkg/{authjwt,dpop} source code is identical at the pre-bump and
#     bump commits (only zeroid/go.mod + go.sum change in between),
#     so the semantic content under the sub-tags matches what the
#     root tag's go.mod references.
#
# Recovery if this workflow fails partway through: tag-submodules in
# release.yml is idempotent (skip-if-exists), so re-running this
# workflow with the same version is safe. If only the sub-tags got
# created and you want to abandon the release entirely, manually
# delete them: `git push --delete origin pkg/authjwt/vX.Y.Z pkg/dpop/vX.Y.Z`.

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (vMAJOR.MINOR.PATCH, e.g. v1.7.0)'
        required: true
        type: string

env:
  GO_VER: "1.26.0"
  GOEXPERIMENT: "jsonv2"
  REGEX_PATTERN: "^v[0-9]+\\.[0-9]+\\.[0-9]+$"

permissions:
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-24.04
    steps:
      - name: Validate version format
        shell: bash
        run: |-
          if [[ ! "${{ inputs.version }}" =~ ${{ env.REGEX_PATTERN }} ]]; then
            echo "::error::version must match vMAJOR.MINOR.PATCH; got ${{ inputs.version }}"
            exit 1
          fi

      # Same App token shape the existing goreleaser job uses. The App
      # must have `contents: write` on this repo AND be allowed to
      # push to main (bypass branch protection or be added to an
      # allow-list rule). Without that, the `git push origin main`
      # step below will fail at the protection check.
      - name: Create App token
        uses: actions/create-github-app-token@v3
        id: token
        with:
          client-id: ${{ secrets.HIGHFLAME_GITHUB_APP_ID }}
          private-key: ${{ secrets.HIGHFLAME_GITHUB_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Checkout main
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0
          token: ${{ steps.token.outputs.token }}

      - name: Setup Golang
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VER }}
          cache: false

      - name: Configure git
        shell: bash
        run: |-
          git config user.name "highflame-release-bot[bot]"
          git config user.email "${{ steps.token.outputs.app-slug }}[bot]@users.noreply.github.com"

      # Tag sub-modules FIRST at current main HEAD, before go.mod is
      # bumped. This is the load-bearing ordering — go mod tidy in
      # the next step needs to resolve the new version, which means
      # the sub-tag must already exist (or the proxy returns "unknown
      # revision"). Idempotent: skip-if-exists handles re-runs.
      - name: Tag sub-modules at current HEAD
        shell: bash
        run: |-
          VERSION="${{ inputs.version }}"
          SUBMODULES=(pkg/authjwt pkg/dpop)
          for SUBMODULE in "${SUBMODULES[@]}"; do
            SUBTAG="${SUBMODULE}/${VERSION}"
            if git rev-parse "${SUBTAG}" >/dev/null 2>&1; then
              echo "Tag ${SUBTAG} already exists locally, skipping"
            else
              git tag "${SUBTAG}"
              git push origin "${SUBTAG}"
              echo "Created and pushed tag ${SUBTAG}"
            fi
          done

      # Bump zeroid/go.mod's cross-module refs to the new version.
      # go mod tidy reconciles go.sum + indirect refs; needs the
      # sub-tags from the previous step to be resolvable, which they
      # are (just pushed). GOFLAGS=-mod=mod forces tidy to write
      # rather than verify-only.
      - name: Bump cross-module version refs in go.mod
        shell: bash
        run: |-
          VERSION="${{ inputs.version }}"
          go mod edit \
            -require=github.com/highflame-ai/zeroid/pkg/authjwt@${VERSION} \
            -require=github.com/highflame-ai/zeroid/pkg/dpop@${VERSION}
          GOFLAGS="-mod=mod" go mod tidy
          echo "--- go.mod diff ---"
          git diff go.mod
          echo "--- go.sum diff (truncated) ---"
          git diff go.sum | head -40

      - name: Commit + push release-prep
        shell: bash
        run: |-
          VERSION="${{ inputs.version }}"
          if git diff --quiet go.mod go.sum; then
            echo "::notice::go.mod + go.sum already match ${VERSION} — no release-prep commit needed."
          else
            git add go.mod go.sum
            git commit -m "devops: prepare release ${VERSION}"
            git push origin main
          fi

      # Create the GitHub release pointing at the (just-pushed) bump
      # commit, OR at the current main HEAD if no bump was needed.
      # `--generate-notes` lets GH auto-author release notes from
      # commits since the last tag.
      - name: Create GitHub release
        shell: bash
        env:
          GH_TOKEN: ${{ steps.token.outputs.token }}
        run: |-
          VERSION="${{ inputs.version }}"
          if gh release view "${VERSION}" >/dev/null 2>&1; then
            echo "::error::Release ${VERSION} already exists. Refusing to overwrite."
            exit 1
          fi
          gh release create "${VERSION}" \
            --target main \
            --title "${VERSION}" \
            --generate-notes
          echo "::notice::Release ${VERSION} created. The on-release-published release.yml workflow now takes over."

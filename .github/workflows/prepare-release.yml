name: Prepare Release - Zeroid (open PR)

# Opens a release-prep PR that bumps zeroid/go.mod's cross-module
# version refs to the target version. Maintainer reviews + merges the
# PR. After merge, the maintainer runs tag-release.yml to create the
# root tag + GitHub release at the merge commit. The downstream
# release.yml workflow takes over from there (validate, sub-module
# tagging idempotent, goreleaser, docker).
#
# This is the PR-based release flow used by opentelemetry-go (and
# similar to etcd's release tooling) — cross-module bumps land via
# a reviewable PR, not a direct push to main. The GitHub UI's "Draft
# a new release" button is intentionally not the entry point; see
# RELEASING.md for the full architectural rationale.
#
# Why bump go.mod via a PR rather than directly on main:
#   - Cross-module ref changes show up in a reviewable diff
#   - Existing branch protection on main stays intact (no bypass needed)
#   - PR-level CI runs against the bumped state before it lands
#
# Why tag sub-modules BEFORE opening the PR:
#   - `go mod tidy` in the bump step needs to resolve the new
#     subpackage versions. Tagging first means the proxy can serve
#     the new versions when tidy runs.
#   - Idempotent (skip-if-exists) so re-runs are safe.
#   - If the PR is abandoned (never merged), the sub-tags become
#     orphans pointing at a real commit with valid source — not
#     catastrophic but worth cleaning up via:
#     `git push --delete origin pkg/{authjwt,dpop}/vX.Y.Z`

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (vMAJOR.MINOR.PATCH, e.g. v1.7.0)'
        required: true
        type: string

env:
  GO_VER: "1.26.0"
  GOEXPERIMENT: "jsonv2"
  REGEX_PATTERN: "^v[0-9]+\\.[0-9]+\\.[0-9]+$"

permissions:
  contents: write
  pull-requests: write

jobs:
  prepare:
    runs-on: ubuntu-24.04
    steps:
      - name: Validate version format
        shell: bash
        run: |-
          if [[ ! "${{ inputs.version }}" =~ ${{ env.REGEX_PATTERN }} ]]; then
            echo "::error::version must match vMAJOR.MINOR.PATCH; got ${{ inputs.version }}"
            exit 1
          fi

      # Same App token shape the goreleaser job uses. The App must have
      # `contents: write` and `pull-requests: write` on this repo.
      - name: Create App token
        uses: actions/create-github-app-token@v3
        id: token
        with:
          client-id: ${{ secrets.HIGHFLAME_GITHUB_APP_ID }}
          private-key: ${{ secrets.HIGHFLAME_GITHUB_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Checkout main
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0
          token: ${{ steps.token.outputs.token }}

      - name: Setup Golang
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VER }}
          cache: false

      - name: Configure git
        shell: bash
        run: |-
          git config user.name "highflame-release-bot[bot]"
          git config user.email "${{ steps.token.outputs.app-slug }}[bot]@users.noreply.github.com"

      # Step 1: tag sub-modules at current main HEAD. Load-bearing —
      # the next step's `go mod tidy` needs these tags to be resolvable.
      - name: Tag sub-modules at current main HEAD
        shell: bash
        run: |-
          VERSION="${{ inputs.version }}"
          for SUBMODULE in pkg/authjwt pkg/dpop; do
            SUBTAG="${SUBMODULE}/${VERSION}"
            if git rev-parse "${SUBTAG}" >/dev/null 2>&1; then
              echo "Tag ${SUBTAG} already exists, skipping"
            else
              git tag "${SUBTAG}"
              git push origin "${SUBTAG}"
              echo "Created and pushed tag ${SUBTAG}"
            fi
          done

      # Step 2: branch off main for the release-prep work.
      - name: Create release-prep branch
        shell: bash
        run: |-
          BRANCH="release-prep/${{ inputs.version }}"
          # Idempotent: if a prior prepare-release run created the
          # branch already, reuse it so the bump is appended to the
          # existing PR rather than spawning a duplicate.
          if git ls-remote --exit-code --heads origin "${BRANCH}" >/dev/null 2>&1; then
            git fetch origin "${BRANCH}"
            git checkout "${BRANCH}"
            git pull --ff-only origin "${BRANCH}"
          else
            git checkout -b "${BRANCH}"
          fi

      # Step 3: bump cross-module refs and reconcile go.sum.
      - name: Bump cross-module version refs in go.mod
        shell: bash
        run: |-
          VERSION="${{ inputs.version }}"
          go mod edit \
            -require=github.com/highflame-ai/zeroid/pkg/authjwt@${VERSION} \
            -require=github.com/highflame-ai/zeroid/pkg/dpop@${VERSION}
          # GOFLAGS=-mod=mod forces tidy to write rather than verify-only.
          # Sub-tags from step 1 exist, so the proxy resolves them.
          GOFLAGS="-mod=mod" go mod tidy
          echo "--- go.mod diff ---"
          git diff go.mod
          echo "--- go.sum diff (truncated) ---"
          git diff go.sum | head -40

      # Step 4: commit the bump on the release-prep branch.
      - name: Commit + push release-prep branch
        shell: bash
        run: |-
          VERSION="${{ inputs.version }}"
          BRANCH="release-prep/${VERSION}"
          if git diff --quiet go.mod go.sum; then
            echo "::notice::go.mod + go.sum already match ${VERSION} — no bump commit needed."
          else
            git add go.mod go.sum
            # `devops:` prefix matches highflame-commit-check and is
            # ignored by svu's version-bump computation.
            git commit -m "devops: prepare release ${VERSION}"
            git push origin "${BRANCH}"
          fi

      # Step 5: open (or update) the release-prep PR. PR body is built
      # via a heredoc to a temp file so multi-line markdown survives
      # YAML block-scalar indentation without each body line needing
      # an indent prefix.
      - name: Open release-prep PR
        shell: bash
        env:
          GH_TOKEN: ${{ steps.token.outputs.token }}
          VERSION: ${{ inputs.version }}
          REPO: ${{ github.repository }}
        run: |-
          BRANCH="release-prep/${VERSION}"
          EXISTING_PR=$(gh pr list --head "${BRANCH}" --state open --json number --jq '.[0].number // ""')
          if [[ -n "${EXISTING_PR}" ]]; then
            echo "::notice::PR already open for ${BRANCH}: #${EXISTING_PR}. Bump appended."
            echo "::notice::Review: $(gh pr view "${EXISTING_PR}" --json url --jq .url)"
            exit 0
          fi
          BODY_FILE=$(mktemp)
          cat >"${BODY_FILE}" <<EOF
          Auto-generated by prepare-release.yml. Bumps cross-module version references in \`zeroid/go.mod\` to **${VERSION}**.

          ## Review checklist

          - [ ] \`go.mod\`: \`pkg/authjwt\` and \`pkg/dpop\` both updated to ${VERSION}
          - [ ] \`go.sum\`: corresponding hashes updated (auto-generated by \`go mod tidy\`)
          - [ ] No other files changed (this PR should be go.mod + go.sum only)

          ## Sub-module tags (already pushed)

          - \`pkg/authjwt/${VERSION}\` → pre-bump main HEAD
          - \`pkg/dpop/${VERSION}\` → pre-bump main HEAD

          These point at the current pre-merge main HEAD. After this PR merges, the root tag will be created at the merge commit (one commit later). The two commits differ only in go.mod + go.sum; \`pkg/{authjwt,dpop}/\` source is byte-identical at both. See RELEASING.md "Subtle consistency note" for the full explanation.

          ## Next step after merge

          \`\`\`bash
          make tag-release VERSION=${VERSION}
          # or equivalently:
          gh workflow run tag-release.yml --repo ${REPO} --field version=${VERSION}
          \`\`\`

          This creates the root \`${VERSION}\` tag at the merge commit and publishes the GitHub release. The downstream \`release.yml\` workflow then validates, runs the integration test suite, builds goreleaser artifacts, and pushes the Docker image.

          ## Abandoning this release

          If this PR is closed without merging, the orphan sub-tags can be deleted:

          \`\`\`bash
          git push --delete origin pkg/authjwt/${VERSION} pkg/dpop/${VERSION}
          \`\`\`
          EOF
          # Strip the leading 10 spaces YAML demanded on every line so
          # the rendered PR body is column-zero markdown.
          sed -i 's/^          //' "${BODY_FILE}"
          PR_URL=$(gh pr create \
            --base main \
            --head "${BRANCH}" \
            --title "devops: prepare release ${VERSION}" \
            --body-file "${BODY_FILE}")
          rm -f "${BODY_FILE}"
          echo "::notice::Opened release-prep PR: ${PR_URL}"

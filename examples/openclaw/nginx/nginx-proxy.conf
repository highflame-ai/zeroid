server {
    # Anyone deploying this should use ssl on to avoid bearer tokens in plaintext
    listen 8081;
    server_name _;

    error_page 401 = @handle_revocation;
    location @handle_revocation {
        default_type application/json;
        # Return 403 instead of 401 so openclaw fails cleanly (401 looks messier in the UI)
        return 403 '{"error": {"message": "ZeroID: Identity Revoked. Access denied by security policy.", "type": "access_denied", "code": "revoked_identity"}}';
    }

    # --- Providers ---
    # Add a location block here for each LLM provider.
    # The path prefix (e.g. /xai/) must match proxy_base_url in config.json.

    location /xai/ {
        auth_request     /internal/zeroid-verify;
        auth_request_set $real_api_key $http_x_real_api_key;

        rewrite ^/xai/(.*)$ /$1 break;

        proxy_set_header  Authorization  "Bearer $real_api_key";
        proxy_set_header  X-Real-Api-Key "";
        proxy_set_header  Host           $proxy_host;
        proxy_ssl_server_name on;
        # Disable response buffering so SSE / streaming responses flow through immediately
        proxy_buffering off;
        proxy_pass https://api.x.ai;
    }

    location /anthropic/ {
        auth_request     /internal/zeroid-verify;
        auth_request_set $real_api_key $http_x_real_api_key;

        rewrite ^/anthropic/(.*)$ /$1 break;

        proxy_set_header  Authorization  "Bearer $real_api_key";
        proxy_set_header  X-Real-Api-Key "";
        proxy_set_header  Host           $proxy_host;
        proxy_ssl_server_name on;
        proxy_buffering off;
        proxy_pass https://api.anthropic.com;
    }

    # Catch-all: unknown provider prefix
    location / {
        default_type application/json;
        return 400 '{"error": {"message": "Unknown provider prefix. Add a location block to nginx config.", "type": "configuration_error"}}';
    }

    location = /internal/zeroid-verify {
        internal;

        proxy_pass              http://zeroid:8899/oauth2/token/verify;
        proxy_pass_request_body off;
        proxy_set_header        Content-Length "";
        proxy_set_header        Authorization $http_authorization;
    }
}

# Map the provider path prefix (e.g. /xai/, /anthropic/) to an upstream base URL.
# $request_uri is used instead of $uri so the match survives internal rewrites.
# Add a new entry here for each LLM provider you want to proxy.
map $request_uri $provider_upstream {
    ~^/xai/       https://api.x.ai;
    ~^/anthropic/ https://api.anthropic.com;
    default       "";
}

server {
    # Anyone deploying this should use ssl on to avoid provider bearer tokens in plaintext
    listen 8081;
    server_name _;
    # DNS resolver required for variable proxy_pass
    resolver 8.8.8.8 valid=30s ipv6=off;

    error_page 401 = @handle_revocation;
    location @handle_revocation {
        default_type application/json;
        # We return a 403 (Forbidden) instead of 401 (Unauthorized)
        # to signal that the key was REJECTED, not MISSING.
        # this is purely to help openclaw fail cleanly (401 errors look a lot messier in the UI)
        return 403 '{"error": {"message": "ZeroID: Identity Revoked. Access denied by security policy.", "type": "access_denied", "code": "revoked_identity"}}';
    }

    location / {
        # Reject requests for unknown providers before doing any auth work
        if ($provider_upstream = "") {
            return 400 '{"error": {"message": "Unknown provider prefix. Add an entry to the nginx map block.", "type": "configuration_error"}}';
        }

        # Verify identity JWT via ZeroID forward-auth endpoint
        auth_request     /internal/zeroid-verify;
        # If auth passes, swap Authorization to the real provider key
        auth_request_set $real_api_key $http_x_real_api_key;

        # Strip the provider path prefix before forwarding upstream
        # e.g. /xai/v1/chat/completions -> /v1/chat/completions
        rewrite ^/[^/]+/(.*)$ /$1 break;

        proxy_set_header  Authorization  "Bearer $real_api_key";
        proxy_set_header  X-Real-Api-Key "";   # strip before forwarding upstream
        proxy_set_header  Host           $proxy_host;
        proxy_ssl_server_name on;
        proxy_pass $provider_upstream;
    }

    location = /internal/zeroid-verify {
        internal;

        proxy_pass              http://zeroid:8899/oauth2/token/verify;
        proxy_pass_request_body off;
        proxy_set_header        Content-Length "";

        # ZeroID reads the bearer token from Authorization
        proxy_set_header  Authorization $http_authorization;
    }
}

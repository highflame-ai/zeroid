server {
    # Anyone deploying this should use ssl on to avoid provider bearer tokens in plaintext
    listen 8081;
    server_name your-proxy.example.com;
    error_page 401 = @handle_revocation;
    location @handle_revocation {
        default_type application/json;
        # We return a 403 (Forbidden) instead of 401 (Unauthorized)
        # to signal that the key was REJECTED, not MISSING.
        # this is purely to help openclaw fail cleanly (401 errors look a lot messier in the UI)
        return 403 '{"error": {"message": "ZeroID: Identity Revoked. Access denied by security policy.", "type": "access_denied", "code": "revoked_identity"}}';
    }
    location / {
        # Verify identity JWT via ZeroID forward-auth endpoint
        auth_request     /internal/zeroid-verify;
        # If auth passes, swap Authorization to the real provider key
        auth_request_set $real_api_key $http_x_real_api_key;

        proxy_set_header  Authorization  "Bearer $real_api_key";
        proxy_set_header  X-Real-Api-Key "";   # strip before forwarding upstream
        proxy_set_header  Host           $proxy_host;
	proxy_ssl_server_name on;
        proxy_pass https://api.x.ai/v1/;
    }

    location = /internal/zeroid-verify {
        internal;

        proxy_pass              http://192.168.48.57:8899/oauth2/token/verify;
        proxy_pass_request_body off;
        proxy_set_header        Content-Length "";

        # ZeroID reads the bearer token from Authorization
        proxy_set_header  Authorization $http_authorization;
    }
}

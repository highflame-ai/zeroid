services:

  # ── Infrastructure ─────────────────────────────────────────────────────────
  postgres:
    image: postgres:17-alpine3.22
    container_name: cascade-db
    restart: on-failure
    environment:
      POSTGRES_USER: zeroid
      POSTGRES_PASSWORD: zeroid
      POSTGRES_DB: zeroid
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - cascade-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zeroid -d zeroid"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  zeroid:
    depends_on:
      postgres:
        condition: service_healthy
    image: highflame-zeroid:latest
    container_name: cascade-zeroid
    restart: on-failure
    build:
      context: ../../
      dockerfile: Dockerfile
    environment:
      ZEROID_DATABASE_URL: "postgres://zeroid:zeroid@postgres:5432/zeroid?sslmode=disable"
      ZEROID_PRIVATE_KEY_PATH: "/keys/private.pem"
      ZEROID_PUBLIC_KEY_PATH: "/keys/public.pem"
      ZEROID_RSA_PRIVATE_KEY_PATH: "/keys/rsa_private.pem"
      ZEROID_RSA_PUBLIC_KEY_PATH: "/keys/rsa_public.pem"
    ports:
      - "8899:8899"
    volumes:
      - ../../keys:/keys:ro
      - ../../zeroid.yaml:/etc/zeroid/zeroid.yaml:ro
    networks:
      - cascade-net
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8899/health"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s
    command: ["/app/zeroid", "-config", "/etc/zeroid/zeroid.yaml"]

  # ── Provisioner (one-shot) ──────────────────────────────────────────────────
  # Registers all 32 agents, builds the delegation chain, writes /shared/manifest.json
  provisioner:
    depends_on:
      zeroid:
        condition: service_healthy
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cascade-provisioner
    command: ["python", "/app/provision.py"]
    environment:
      ZEROID_BASE_URL: "http://zeroid:8899"
      ZEROID_ADMIN_API_KEY: "${ZEROID_ADMIN_API_KEY:-demo-admin-key}"
      MANIFEST_PATH: "/shared/manifest.json"
      HIERARCHY_PATH: "/app/hierarchy.yaml"
    volumes:
      - shared-data:/shared
    networks:
      - cascade-net

  # ── Observability ───────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.55.0
    container_name: cascade-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    networks:
      - cascade-net
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"

  grafana:
    image: grafana/grafana:11.3.0
    container_name: cascade-grafana
    restart: unless-stopped
    ports:
      - "3100:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/cascade.json
      GF_DASHBOARDS_MIN_REFRESH_INTERVAL: 2s
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    networks:
      - cascade-net

  # ── Tier 1: Orchestrators ──────────────────────────────────────────────────
  orch-business:
    depends_on:
      provisioner:
        condition: service_completed_successfully
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cascade-orch-business
    restart: unless-stopped
    environment:
      AGENT_NAME: orch-business
      ZEROID_BASE_URL: "http://zeroid:8899"
      MANIFEST_PATH: "/shared/manifest.json"
      CHILD_URLS: "http://spec-finance:8080,http://spec-hr:8080,http://spec-legal:8080,http://spec-sales:8080"
    volumes:
      - shared-data:/shared:ro
    networks:
      - cascade-net
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/health"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

  orch-platform:
